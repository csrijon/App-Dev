<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

                        "inverse-on-surface": "#a29d88",

<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .art-mask {
            mask-image: radial-gradient(circle, black 50%, transparent 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center px-6 h-16 bg-stone-50/80 dark:bg-stone-900/80 backdrop-blur-xl">
<button class="transition-all duration-300 active:scale-95 p-2 rounded-full hover:bg-stone-100 dark:hover:bg-stone-800 text-stone-700 dark:text-stone-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="ml-4 font-['Plus_Jakarta_Sans'] font-bold text-lg text-stone-700 dark:text-stone-200">Reset Password</h1>
</header>
<main class="w-full max-w-md px-6 pt-24 pb-12 flex flex-col items-center">
<!-- Visual Anchor: Bakery-themed Illustration -->
<div class="relative mb-10 w-48 h-48 flex items-center justify-center">
<div class="absolute inset-0 bg-primary-container opacity-20 rounded-full blur-3xl"></div>
<div class="relative z-10 w-full h-full rounded-xl overflow-hidden flex items-center justify-center bg-surface-container-lowest shadow-[0_24px_48px_rgba(117,88,78,0.08)]">
<img class="w-full h-full object-cover" data-alt="A beautifully crafted, artisanal cake box made of premium textured cream paper with a delicate gold lock icon embossed on the front. The scene is set in a sun-drenched, high-end pâtisserie kitchen with soft focus bakery tools in the background. The lighting is warm and airy, emphasizing the soft pastel browns and creams of the Glaze &amp; Grain brand identity. The overall mood is secure, premium, and welcoming." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBx6d0E035583pwTt7aXc5beh9dT4v6lfhEbcSvDTPWVHCIJnpjVUoMM0VesoVoH5R1t6dqy8iw5llYEba0BIkem2WICAGjFV8Tba3TYu7Sp3v7KN5fvE25okgLQvKieif0Q_cZ3Cfn5ECJ7LdFx4_ABd0yp_z4RZoHhOt_MvgZ9detcmwBe9kQU1kWq30qRjIF7sioPLjGPzdSyVWj0I1iHERxqEXwz3aIgetKjq5JsQYMqpE9-CTBk4W6wdD9u9teuGHPsS4_b6r-"/>
<div class="absolute inset-0 bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-6xl" data-icon="lock_reset">lock_reset</span>
</div>
</div>
</div>
<!-- Typography Section -->
<section class="text-center mb-10">
<h2 class="text-[1.75rem] font-bold leading-tight mb-3 text-on-surface">Set New Password</h2>
<p class="text-on-surface-variant leading-relaxed px-4">
                Your new password must be different from previously used passwords.
            </p>
</section>
<!-- Form Section -->
<form class="w-full space-y-6">
<!-- New Password Field -->
<div class="space-y-2">
<label class="block text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-4">New Password</label>
<div class="relative group">
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-primary">
<span class="material-symbols-outlined" data-icon="lock">lock</span>
</div>
<input class="w-full h-14 pl-12 pr-12 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-on-surface-variant/40" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Confirm New Password Field -->
<div class="space-y-2">
<label class="block text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-4">Confirm New Password</label>
<div class="relative group">
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-primary">
<span class="material-symbols-outlined" data-icon="lock_person">lock_person</span>
</div>
<input class="w-full h-14 pl-12 pr-12 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-on-surface-variant/40" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Password Requirements (Visual Polish) -->
<div class="flex flex-wrap gap-2 px-2">
<div class="flex items-center gap-1 bg-surface-container-low px-3 py-1.5 rounded-full">
<span class="material-symbols-outlined text-[14px] text-primary" data-icon="check_circle">check_circle</span>
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider">8+ Characters</span>
</div>
<div class="flex items-center gap-1 bg-surface-container-low px-3 py-1.5 rounded-full">
<span class="material-symbols-outlined text-[14px] text-primary" data-icon="check_circle">check_circle</span>
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider">1 Symbol</span>
</div>
<div class="flex items-center gap-1 bg-surface-container-low px-3 py-1.5 rounded-full">
<span class="material-symbols-outlined text-[14px] text-outline-variant" data-icon="circle">circle</span>
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider">1 Number</span>
</div>
</div>
<!-- CTA -->
<div class="pt-4">
<button class="w-full h-16 bg-gradient-to-br from-primary to-primary-dim text-on-primary rounded-full font-bold text-lg flex items-center justify-center gap-3 shadow-[0_24px_48px_rgba(117,88,78,0.15)] transition-transform active:scale-95 group">
                    Update Password
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Decorative Footer Element -->
<div class="mt-16 flex items-center gap-2 opacity-40">
<div class="h-[1px] w-8 bg-outline-variant"></div>
<span class="material-symbols-outlined text-primary text-sm" data-icon="bakery_dining">bakery_dining</span>
<div class="h-[1px] w-8 bg-outline-variant"></div>
</div>
</main>
<!-- Simple Feedback Toast (Static) -->
<div class="fixed bottom-10 px-6 w-full max-w-md hidden">
<div class="bg-inverse-surface text-inverse-on-surface px-6 py-4 rounded-xl flex items-center justify-between shadow-2xl">
<span class="text-sm font-medium">Security protocols updated.</span>
<button class="text-primary-container font-bold text-sm">Undo</button>
</div>
</div>
</body></html>
